services:
  - type: web
    name: hpylori-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-app.netlify.app
    plan: free
    autoDeploy: true