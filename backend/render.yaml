build:
  pipArgs: ["--python", "3.11"]

services:
  - type: web
    name: hpylori-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-netlify-site.netlify.app
    plan: free
    autoDeploy: true